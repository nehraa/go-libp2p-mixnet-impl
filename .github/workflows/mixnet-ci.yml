name: Mixnet CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: mixnet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-tests:
    name: Go Test Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run mixnet Go tests
        run: go test ./mixnet/...

  benchmark-smoke:
    name: Benchmark Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run smoke benchmark
        run: ./mixnet/benchmarks/run_local_benchmarks.sh smoke --runs 1

  docker-sanity:
    name: Docker Sanity
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run dockerized sanity suite
        run: bash mixnet/tests/docker/run-docker-tests.sh
