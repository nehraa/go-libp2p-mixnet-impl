name: Network CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: mixnet-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hub-validation:
    name: Hub Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Vet hub package
        run: go vet ./p2p/hub/...

      - name: Run repeated hub tests
        run: go test -shuffle=on -count=10 ./p2p/hub/...

      - name: Run hub race tests
        run: go test -race ./p2p/hub/...

      - name: Enforce hub coverage floor
        run: |
          go test -count=1 -coverprofile=/tmp/hub-cover.out ./p2p/hub/...
          total=$(go tool cover -func=/tmp/hub-cover.out | awk '/^total:/ {gsub("%", "", $3); print $3}')
          awk -v total="$total" 'BEGIN { if (total+0 < 85.0) { exit 1 } }'

  repo-validation:
    name: Repo Validation
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Vet repository
        run: go vet ./...

      - name: Run repository Go tests
        run: go test -count=1 ./...

  benchmark-smoke:
    name: Benchmark Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run smoke benchmark
        run: ./mixnet/benchmarks/run_local_benchmarks.sh smoke --runs 1

  docker-sanity:
    name: Docker Integration
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Run docker integration tests
        run: go test -count=1 -tags docker_integration ./mixnet/core -run '^(TestDockerComposeUpDown|TestDockerFailureAndRecoverFromFailure)$' -v
